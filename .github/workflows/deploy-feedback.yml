name: Deploy feedback system

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Start SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.VPS_SSH_KEY }}

      - name: Disable host key checking
        run: |
          mkdir -p ~/.ssh
          cat > ~/.ssh/config <<'EOF'
          Host *
            StrictHostKeyChecking no
          EOF

      - name: Deploy
        run: |
          ssh ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} "/var/www/feedback/deploy.sh"